<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8/>
<title>Lab 1. Introduction to HTML5 and HLS</title>
  
<link href="https://vjs.zencdn.net/8.0.4/video-js.css" rel="stylesheet" />
<script src="https://vjs.zencdn.net/8.0.4/video.min.js"></script>

</head>
<body>
  <h1>My first HLS player</h1>
    <video 
    id="video" 
    class="video-js vjs-default-skin" 
    controls 
    preload="auto" 
    width="640" 
    height="360"
    data-setup='{}'>
  </video>
  
  <div class="controls">
	  <button type="button" onclick="PlayVid()">Play</button>
	  <button type="button" onclick="pauseVideo()">Pause</button>
	  <button type="button" onclick="stopVideo()">Start over</button>
	  <button type="button" onclick="jumpForward()">Jump to 5 sec forward</button>
	  <button type="button" onclick="jumpBackward()">Jump to 5 sec backwards</button>	
    <button type="button" id="muteBtn" onclick="toggleMute()">Mute</button>
 
  </div>

  <div class="playlist">
	  <p>Playlist</p>
    <input type="text" id="url1" name="url1" size="100" value="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"><button type="button" onclick="loadURL1()">Load</button>
    <input type="text" id="url2" name="url2" size="100" value="https://d2zihajmogu5jn.cloudfront.net/bipbop-advanced/bipbop_16x9_variant.m3u8"><button type="button" onclick="loadURL2()">Load</button>
    <input type="text" id="url3" name="url3" size="100" value="https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8"><button type="button" onclick="loadURL3()">Load</button>
    <div class="shuffle-container">
      <button type="button" onclick="shuffleVideo()">Shuffle</button>
    </div>
  </div>

  
  <script src="js/control.js"></script>
</body>
</html>
